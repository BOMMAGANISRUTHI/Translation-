<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tongue &mdash; Language Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1B2430;
    --ink-soft: #232E3D;
    --paper: #F7F3EA;
    --paper-dim: #ECE6D8;
    --sage: #7C9885;
    --sage-bright: #93B09C;
    --rust: #C2542D;
    --slate: #8B95A6;
    --slate-dim: #5C6678;
    --seam: #D8CDB4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: clamp(24px, 5vw, 56px) clamp(16px, 4vw, 32px) 64px;
  }

  header.hero {
    margin-bottom: clamp(28px, 5vw, 48px);
  }

  .eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage-bright);
    margin: 0 0 14px;
    font-weight: 600;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    line-height: 1.05;
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--sage-bright);
  }

  .sub {
    color: var(--slate);
    font-size: 1.05rem;
    max-width: 480px;
    line-height: 1.55;
    margin: 0;
  }

  /* ---- Translator card ---- */
  .translator {
    position: relative;
    background: var(--ink-soft);
    border-radius: 18px;
    border: 1px solid #2C3A4D;
    overflow: hidden;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
  }

  @media (max-width: 720px) {
    .panels { grid-template-columns: 1fr; }
    .seam-h { display: flex !important; }
    .seam-v { display: none !important; }
  }

  .panel {
    padding: clamp(20px, 4vw, 32px);
    display: flex;
    flex-direction: column;
    min-height: 280px;
  }

  .panel.source { background: var(--paper); color: var(--ink); }
  .panel.target { background: var(--paper-dim); color: var(--ink); }

  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  select.lang-select {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.92rem;
    color: var(--ink);
    background: transparent;
    border: none;
    appearance: none;
    cursor: pointer;
    padding: 4px 22px 4px 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%231B2430' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right center;
  }

  .char-count {
    font-size: 0.75rem;
    color: var(--slate-dim);
    font-family: 'Inter', monospace;
  }

  textarea {
    flex: 1;
    resize: none;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 1.08rem;
    line-height: 1.5;
    color: var(--ink);
    outline: none;
    min-height: 160px;
  }

  textarea::placeholder { color: #A8A096; }

  .target-text {
    flex: 1;
    font-size: 1.08rem;
    line-height: 1.5;
    min-height: 160px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .target-text.placeholder { color: #9AA3A0; font-style: italic; }

  .target-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .icon-btn {
    background: rgba(27,36,48,0.06);
    border: 1px solid rgba(27,36,48,0.12);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--slate-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .icon-btn:hover { background: var(--sage); color: white; border-color: var(--sage); }
  .icon-btn:active { transform: translateY(1px); }
  .icon-btn.copied { background: var(--sage); color: white; border-color: var(--sage); }

  /* ---- Seam ---- */
  .seam-v {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--seam);
    transform: translateX(-50%);
    z-index: 2;
  }

  .swap-btn {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--sage);
    border: 4px solid var(--ink-soft);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 3;
    transition: transform 0.25s ease, background 0.15s;
  }

  .swap-btn:hover { background: var(--sage-bright); }
  .swap-btn.spin { transform: translate(-50%, -50%) rotate(180deg); }

  .seam-h {
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--ink-soft);
    padding: 10px 0;
  }

  .seam-h .swap-btn {
    position: relative;
    left: auto; top: auto; transform: none;
  }
  .seam-h .swap-btn.spin { transform: rotate(180deg); }

  /* ---- Footer bar ---- */
  .action-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px clamp(20px, 4vw, 32px);
    background: var(--ink);
    border-top: 1px solid #2C3A4D;
    gap: 12px;
    flex-wrap: wrap;
  }

  .status {
    font-size: 0.85rem;
    color: var(--slate);
    min-height: 1.2em;
  }

  .status.error { color: var(--rust); }
  .status.ok { color: var(--sage-bright); }

  .translate-btn {
    background: var(--sage);
    color: var(--ink);
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 12px 28px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .translate-btn:hover { background: var(--sage-bright); }
  .translate-btn:active { transform: translateY(1px); }
  .translate-btn:disabled { opacity: 0.55; cursor: default; }

  footer.note {
    margin-top: 28px;
    color: var(--slate-dim);
    font-size: 0.82rem;
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce) {
    .swap-btn, .translate-btn, .icon-btn { transition: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="hero">
    <p class="eyebrow">Language &middot; Translator</p>
    <h1>Say it in <em>any</em><br>tongue.</h1>
    <p class="sub">Type on one side of the seam, choose where it should land, and watch it cross over.</p>
  </header>

  <div class="translator">
    <div class="panels">
      <div class="panel source">
        <div class="panel-head">
          <select id="sourceLang" class="lang-select">
            {% for code, name in source_langs.items() %}
            <option value="{{ code }}" {% if code == 'auto' %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
          </select>
          <span class="char-count" id="charCount">0 / 4500</span>
        </div>
        <textarea id="sourceText" placeholder="Start typing&hellip;" maxlength="4500"></textarea>
      </div>

      <div class="seam-v"></div>
      <button class="swap-btn" id="swapBtn" title="Swap languages" aria-label="Swap languages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 7h11l-3-3M17 17H6l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="panel target">
        <div class="panel-head">
          <select id="targetLang" class="lang-select">
            {% for code, name in target_langs.items() %}
            <option value="{{ code }}" {% if code == 'en' %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="target-text placeholder" id="targetText">Your translation appears here.</div>
        <div class="target-actions">
          <button class="icon-btn" id="copyBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2"/></svg>
            Copy
          </button>
          <button class="icon-btn" id="speakBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 5V4L8 9H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M16 8a5 5 0 010 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Listen
          </button>
        </div>
      </div>
    </div>

    <div class="seam-h">
      <button class="swap-btn" id="swapBtnMobile" title="Swap languages" aria-label="Swap languages">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 4v16M6 10l6-6 6 6M6 14l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="action-bar">
      <span class="status" id="statusText"></span>
      <button class="translate-btn" id="translateBtn">Translate</button>
    </div>
  </div>

  <footer class="note">Built with Flask &amp; deep-translator &middot; free Google Translate engine</footer>
</div>

<script>
const sourceText = document.getElementById('sourceText');
const targetText = document.getElementById('targetText');
const sourceLang = document.getElementById('sourceLang');
const targetLang = document.getElementById('targetLang');
const translateBtn = document.getElementById('translateBtn');
const statusText = document.getElementById('statusText');
const charCount = document.getElementById('charCount');
const copyBtn = document.getElementById('copyBtn');
const speakBtn = document.getElementById('speakBtn');

function updateCharCount() {
  charCount.textContent = `${sourceText.value.length} / 4500`;
}
sourceText.addEventListener('input', updateCharCount);

let debounceTimer = null;
function scheduleTranslate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doTranslate, 700);
}
sourceText.addEventListener('input', scheduleTranslate);
sourceLang.addEventListener('change', doTranslate);
targetLang.addEventListener('change', doTranslate);

async function doTranslate() {
  const text = sourceText.value.trim();
  if (!text) {
    targetText.textContent = 'Your translation appears here.';
    targetText.classList.add('placeholder');
    statusText.textContent = '';
    statusText.className = 'status';
    return;
  }

  translateBtn.disabled = true;
  statusText.textContent = 'Translating…';
  statusText.className = 'status';

  try {
    const res = await fetch('/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        source: sourceLang.value,
        target: targetLang.value
      })
    });
    const data = await res.json();

    if (!res.ok) {
      statusText.textContent = data.error || 'Something went wrong.';
      statusText.className = 'status error';
      return;
    }

    targetText.textContent = data.translated_text;
    targetText.classList.remove('placeholder');
    statusText.textContent = 'Translated';
    statusText.className = 'status ok';
  } catch (err) {
    statusText.textContent = 'Network error. Please try again.';
    statusText.className = 'status error';
  } finally {
    translateBtn.disabled = false;
  }
}

translateBtn.addEventListener('click', doTranslate);

function swapLanguages() {
  const swapBtn = document.getElementById('swapBtn');
  swapBtn.classList.add('spin');
  setTimeout(() => swapBtn.classList.remove('spin'), 260);

  if (sourceLang.value === 'auto') {
    statusText.textContent = "Can't swap from Detect Language — pick a language first.";
    statusText.className = 'status error';
    return;
  }

  const sVal = sourceLang.value;
  const tVal = targetLang.value;

  // target select has no "auto" option, so only swap if source target exists there
  if ([...targetLang.options].some(o => o.value === sVal)) {
    targetLang.value = sVal;
  }
  if ([...sourceLang.options].some(o => o.value === tVal)) {
    sourceLang.value = tVal;
  }

  const oldSourceText = sourceText.value;
  const oldTargetText = targetText.classList.contains('placeholder') ? '' : targetText.textContent;
  sourceText.value = oldTargetText;
  targetText.textContent = oldSourceText || 'Your translation appears here.';
  if (!oldSourceText) targetText.classList.add('placeholder');
  updateCharCount();

  if (sourceText.value.trim()) doTranslate();
}

document.getElementById('swapBtn').addEventListener('click', swapLanguages);
document.getElementById('swapBtnMobile').addEventListener('click', swapLanguages);

copyBtn.addEventListener('click', () => {
  const text = targetText.textContent;
  if (!text || targetText.classList.contains('placeholder')) return;
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.classList.add('copied');
    const original = copyBtn.innerHTML;
    copyBtn.innerHTML = 'Copied!';
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyBtn.innerHTML = original;
    }, 1400);
  });
});

speakBtn.addEventListener('click', () => {
  const text = targetText.textContent;
  if (!text || targetText.classList.contains('placeholder')) return;
  if (!('speechSynthesis' in window)) {
    statusText.textContent = 'Speech not supported on this browser.';
    statusText.className = 'status error';
    return;
  }
  const utter = new SpeechSynthesisUtterance(text);
  const lang = targetLang.value;
  utter.lang = lang === 'zh-CN' ? 'zh-CN' : lang;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
});

updateCharCount();
</script>
</body>
</html>
